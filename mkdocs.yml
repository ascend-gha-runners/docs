site_name: Ascend GitHub Action Runners
site_url: https://ascend-gha-runners.github.io/docs/
repo_name: ascend-gha-runners/docs
repo_url: https://github.com/ascend-gha-runners/docs
edit_uri: blob/main/docs/
theme:
  name: material
  logo: assets/logo/logo.png
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  generator: false
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - glightbox

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  # - mdx_truly_sane_lists
  - pymdownx.details
  - toc:
      permalink: true
nav:
  - Home:
    - Getting Started: index.md
    - Future Plans: "#future-plans"
  - GitHub Actions Guide En:
    - user-manual-gha-en.md
  - GitHub Actions Guide Zh:
    - user-manual-gha-zh.md
  - Buildkite Guide En:
    - user-manual-buildkite-en.md
  - Buildkite Guide Zh:
    - user-manual-buildkite-zh.md
  - Integrated repo:
    - Repo.md
  - Features:
    - feature.md
  - Pod Status Reference:
    - error-types.md
