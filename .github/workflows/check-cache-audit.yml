name: CI Cache Audit

on:
  schedule:
    - cron: "24 2 * * *" # 每天 10:24 北京时间 (UTC+8)
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYPI_CACHE_KEYWORD: ${{ vars.PYPI_CACHE_KEYWORD || 'cache-service.nginx-pypi-cache.svc.cluster.local' }}
      APT_CACHE_PATTERN: ${{ vars.APT_CACHE_PATTERN || '(ports|archive|ubuntu)\.com.*:8081|Acquire::http::Proxy.*:8081' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run cache audit
        id: audit
        run: |
          bash scripts/ci-audit/check_cache.sh scripts/ci-audit/repos.txt | tee audit_result.md

      - name: Write job summary
        if: always()
        run: |
          echo "## CI 缓存审计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "运行时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') (CST)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat audit_result.md >> $GITHUB_STEP_SUMMARY
